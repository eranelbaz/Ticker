name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: set-packages
        run: |
          # Use pnpm recursive list to get project names and format as JSON array
          # We filter for only the project names in a simple JSON array
          PACKAGES=$(pnpm ls -r --depth -1 --json | jq -c '[.[] | select(.name != "ticker") | .name]')
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

  test:
    needs: detect-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r build

      - name: Run tests for ${{ matrix.package }}
        run: pnpm --filter ${{ matrix.package }} test

  verify:
    needs: [detect-packages, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all tests passed
        env:
          TEST_RESULT: ${{ needs.test.result }}
          PACKAGES: ${{ needs.detect-packages.outputs.packages }}
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| ------- | ------ |" >> $GITHUB_STEP_SUMMARY
          for pkg in $(echo "$PACKAGES" | jq -r '.[]'); do
            if [ "$TEST_RESULT" = "success" ]; then
              echo "| \`$pkg\` | ✅ passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$pkg\` | ❌ failed |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$TEST_RESULT" != "success" ]; then
            echo "**Result: tests failed — merge blocked**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "**Result: all tests passed**" >> $GITHUB_STEP_SUMMARY
